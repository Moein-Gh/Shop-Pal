services:
  backend:
    build:
      context: ./backend
      target: builder
    command: npm run dev
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
        - action: rebuild
          path: ./backend/package.json

